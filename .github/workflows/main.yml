name: Build Mod JAR
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3
      - name: Derle
        run: gradle build --no-daemon
        working-directory: chunk-copier-mod
      - name: JAR yukle
        uses: actions/upload-artifact@v4
        with:
          name: chunk-copier-mod
          path: chunk-copier-mod/build/libs/chunk-copier-*.jar

name: Build Mod JAR
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - name: Derle
        run: |
          BUILD_DIR=$(find . -name "build.gradle" | head -1 | xargs dirname)
          echo "Build klasoru: $BUILD_DIR"
          cd "$BUILD_DIR"
          gradle build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-copier-mod
          path: "**/build/libs/chunk-copier-*.jar"
